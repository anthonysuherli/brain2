# brain2 engine config — layered on top of Delapan defaults.
# Override any section/field with env var B2_<SECTION>__<FIELD> (highest
# precedence), e.g. B2_SEARCH__DEFAULT_LIMIT=20.
#
# NOTE: storage-backend selection is NOT configured here. It is driven by the
# BRAIN2_BACKEND env var ("local" | "cloud"); if unset, brain2 uses cloud iff
# Supabase creds are present, else local. See .env.example.

agent:
  model: "claude-sonnet-4-6"
  fast_model: "claude-haiku-4-5"

synopsis:
  model: "claude-haiku-4-5"
  rebuild_delta: 5          # snapshots accumulate faster than research findings

search:
  default_limit: 10
  min_similarity: 0.0

tiers:
  rich_hit_count: 3
  preamble_char_budget: 5000  # resume card is tighter than a full chat preamble

exploration:
  planner_model: "mistral/mistral-large-latest"
  extraction_model: "mistral/mistral-large-latest"
  extraction_fallback_model: "mistral/mistral-small-latest"
  evaluation_model: "mistral/mistral-large-latest"

activity:
  task_model: "mistral/mistral-small-latest"
  task_fallback_model: "mistral/mistral-small-latest"
